name: Newsletter BG Variacoes

on:
  schedule:
    # Roda todo dia as 08:00 horario de Brasilia (UTC-3 = 11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:
    # Permite disparar manualmente pelo botao Run workflow

jobs:
  enviar-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Executar script da newsletter
        env:
          NTFY_TOPICO: ${{ secrets.NTFY_TOPICO }}
        run: python newsletter_variacoes.py
